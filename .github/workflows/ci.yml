name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Kaynak kodu al
        uses: actions/checkout@v6

      - name: Python 3.11 kur
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Bağımlılıkları kur
        run: python -m pip install --disable-pip-version-check -r requirements.txt ruff==0.15.22

      - name: Statik kod denetimini çalıştır
        run: ruff check main.py core tests

      - name: Python sözdizimini denetle
        run: python -m compileall -q main.py core tests

      - name: Otomatik testleri çalıştır
        run: python -m unittest discover -s tests -v
